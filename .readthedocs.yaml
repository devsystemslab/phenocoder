# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

# Install only the docs dependencies. The package itself is NOT installed:
# heavy runtime deps (tensorflow, spatialdata, ...) are mocked in docs/conf.py,
# and conf.py adds the repo root to sys.path so autodoc can import the source.
python:
  install:
    - requirements: docs/requirements.txt

formats:
  - htmlzip
